<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ôn thi trắc nghiệm</title>

    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-3">📘 ÔN THI TRẮC NGHIỆM</h2>

    <!-- 🔧 THANH ĐIỀU KHIỂN (GỘP LẠI) -->
    <div class="top-bar mb-3">

        <div class="row align-items-center">

            <!-- CHỌN PHẦN -->
            <div class="col-md-3">
                <select id="sectionSelect" class="form-control form-control-sm">
                    <option value="ALL">Tất cả</option>
                    <option value="CM">Chuyên môn (CM)</option>
                    <option value="KTC">Kiến thức chung (KTC)</option>
                </select>
            </div>

            <!-- TRỘN -->
            <div class="col-md-2 text-center">
                <label style="font-size:13px;">
                    <input type="checkbox" id="shuffleToggle">
                    🔀 Trộn
                </label>
            </div>

            <!-- THỜI GIAN -->
            <div class="col-md-3">
                <select id="timeSelect" class="form-control form-control-sm">
                    <option value="0">Không giới hạn</option>
                    <option value="2700">45 phút</option>
                    <option value="5400">90 phút</option>
                </select>
            </div>

            <!-- TIMER -->
            <div class="col-md-2 text-center">
                <span id="timerDisplay" style="font-weight:bold;"></span>
            </div>

            <!-- FILE -->
            <div class="col-md-2 text-right">
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="btn btn-sm btn-primary" />
				<button class="btn btn-sm btn-success" onclick="generateExam()">
    🎯 Thi 100 câu
</button>
            </div>

        </div>

    </div>

    <!-- 🔎 TÌM KIẾM -->
    <div class="text-center mb-3">
        <input 
            type="text" 
            id="searchInput" 
            class="form-control form-control-sm" 
            placeholder="🔎 Tìm kiếm câu hỏi..." 
            style="max-width:400px; margin:auto;"
            oninput="searchQuestion()"
        >
    </div>

    <div class="row">

        <!-- CÂU HỎI -->
        <div class="col-md-8">
            <div id="quizContainer"></div>
        </div>

        <!-- BẢNG CÂU -->
        <div class="col-md-4">
            <div class="question-panel">
                <h5 class="text-center">📋 Danh sách câu</h5>
                <div id="questionPalette" class="d-flex flex-wrap"></div>
            </div>
        </div>

    </div>

    <!-- NÚT -->
    <div class="text-center mt-3">
        <button class="btn btn-danger" onclick="submitQuiz()">🚀 Nộp bài</button>
        <button class="btn btn-warning mt-2" onclick="reviewWrong()">🔁 Học lại câu sai</button>
		<button class="btn btn-info mt-2" onclick="printResult()">🖨️ In kết quả</button>
    </div>

    <!-- KẾT QUẢ -->
    <div id="result" class="text-center mt-3"></div>

</div>

<script src="xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
